<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tennis">
  <title>Tennis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a1628;
      color: #fff;
      font-family: -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #8ca0be;
      font-size: 15px;
      margin-bottom: 48px;
      text-align: center;
    }

    .mic-btn {
      width: 120px;
      height: 120px;
      border-radius: 60px;
      border: none;
      background: #2563eb;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 0 0 0 rgba(37,99,235,0.4);
    }

    .mic-btn:active { transform: scale(0.95); }

    .mic-btn.listening {
      background: #dc2626;
      animation: pulse 1.2s infinite;
    }

    .mic-btn.loading {
      background: #d97706;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
      70%  { box-shadow: 0 0 0 20px rgba(220,38,38,0); }
      100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
    }

    .mic-icon { width: 48px; height: 48px; fill: #fff; }

    .status {
      margin-top: 32px;
      font-size: 16px;
      color: #8ca0be;
      text-align: center;
      min-height: 24px;
    }

    .bubble {
      margin-top: 24px;
      background: #1e3a5f;
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 16px;
      line-height: 1.5;
      width: 100%;
      max-width: 360px;
      display: none;
      white-space: pre-wrap;
    }

    .bubble.visible { display: block; }

    .hint {
      margin-top: 40px;
      color: #4a6080;
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <h1>🎾 Tennis</h1>
  <p class="subtitle">Appuie et parle</p>

  <button class="mic-btn" id="micBtn" onclick="toggle()">
    <svg class="mic-icon" viewBox="0 0 24 24">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 15.93V19H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/>
    </svg>
  </button>

  <p class="status" id="status">Appuie pour parler</p>
  <div class="bubble" id="bubble"></div>

  <p class="hint">
    Exemples :<br>
    "Réserve demain à 14h"<br>
    "Quels courts sont libres jeudi ?"<br>
    "Surveille mercredi à 10h"
  </p>

  <script>
    const btn = document.getElementById('micBtn');
    const status = document.getElementById('status');
    const bubble = document.getElementById('bubble');

    let recognition = null;
    let listening = false;

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'fr-FR';
      utterance.rate = 1.0;
      window.speechSynthesis.speak(utterance);
    }

    function showBubble(text) {
      bubble.textContent = text;
      bubble.classList.add('visible');
    }

    async function sendQuery(query) {
      btn.classList.remove('listening');
      btn.classList.add('loading');
      status.textContent = '⏳ En cours...';

      try {
        const url = '/chat?q=' + encodeURIComponent(query);
        const res = await fetch(url);
        const data = await res.json();
        const reponse = data.reponse || data.error || 'Erreur inconnue';
        showBubble(reponse);
        speak(reponse);
        status.textContent = 'Appuie pour parler';
      } catch (e) {
        status.textContent = 'Erreur réseau';
      } finally {
        btn.classList.remove('loading');
      }
    }

    function toggle() {
      if (listening) {
        recognition && recognition.stop();
        return;
      }

      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        status.textContent = '❌ Micro non supporté sur ce navigateur';
        return;
      }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'fr-FR';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        listening = true;
        btn.classList.add('listening');
        status.textContent = '🎤 J\'écoute...';
        bubble.classList.remove('visible');
        window.speechSynthesis.cancel();
      };

      recognition.onresult = (e) => {
        const query = e.results[0][0].transcript;
        status.textContent = '🗣 "' + query + '"';
        sendQuery(query);
      };

      recognition.onerror = (e) => {
        status.textContent = 'Erreur micro : ' + e.error;
        btn.classList.remove('listening');
        listening = false;
      };

      recognition.onend = () => {
        listening = false;
        btn.classList.remove('listening');
      };

      recognition.start();
    }
  </script>
</body>
</html>
